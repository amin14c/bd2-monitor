name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          mkdir -p app
          keytool -genkey -v \
            -keystore app/mediassistant.jks \
            -alias mediassistant \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass mediassistant123 \
            -keypass mediassistant123 \
            -dname "CN=Amin, OU=MediAssistant, O=Medical, L=Algiers, S=Algeria, C=DZ"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix file encoding
        run: |
          find app/src -name "*.kt" -exec sed -i 's/\r//' {} \;
          find app/src -name "*.kt" -exec sed -i 's/^\xEF\xBB\xBF//' {} \;

      - name: Recreate Room files
        run: |
          cat > app/src/main/java/com/bd2monitor/DailyRecord.kt << 'EOF'
          package com.bd2monitor
          import androidx.room.Entity
          import androidx.room.PrimaryKey
          @Entity(tableName = "daily_records")
          data class DailyRecord(
              @PrimaryKey(autoGenerate = true) val id: Int = 0,
              val date: String,
              val mood: Int,
              val energy: Int,
              val sleepHours: Float,
              val medicationTaken: Boolean,
              val steps: Int = 0,
              val note: String = "",
              val timestamp: Long = System.currentTimeMillis()
          )
          EOF
          cat > app/src/main/java/com/bd2monitor/Medication.kt << 'EOF'
          package com.bd2monitor
          import androidx.room.Entity
          import androidx.room.PrimaryKey
          @Entity(tableName = "medications")
          data class Medication(
              @PrimaryKey(autoGenerate = true) val id: Int = 0,
              val nameFr: String,
              val nameAr: String,
              val dosage: String,
              val timeHour: Int,
              val timeMinute: Int,
              val isActive: Boolean = true
          )
          EOF
          cat > app/src/main/java/com/bd2monitor/PatientProfile.kt << 'EOF'
          package com.bd2monitor
          import androidx.room.Entity
          import androidx.room.PrimaryKey
          @Entity(tableName = "patient_profile")
          data class PatientProfile(
              @PrimaryKey val id: Int = 1,
              val fullNameAr: String = "",
              val fullNameFr: String = "",
              val birthDate: String = "",
              val diagnosis: String = "",
              val doctorName: String = "",
              val emergencyContact: String = "",
              val notes: String = ""
          )
          EOF

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEY_ALIAS: mediassistant
          SIGNING_KEY_PASSWORD: mediassistant123
          SIGNING_STORE_PASSWORD: mediassistant123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MediAssistant-Release
          path: android/app/build/outputs/apk/release/*.apk
