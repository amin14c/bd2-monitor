name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          mkdir -p app
          keytool -genkey -v \
            -keystore app/mediassistant.jks \
            -alias mediassistant \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass mediassistant123 \
            -keypass mediassistant123 \
            -dname "CN=Amin, OU=MediAssistant, O=Medical, L=Algiers, S=Algeria, C=DZ"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix file encoding
        run: |
          find app/src -name "*.kt" -exec sed -i 's/\r//' {} \;
          find app/src -name "*.kt" -exec sed -i 's/^\xEF\xBB\xBF//' {} \;

      - name: Recreate Room files
        run: |
          python3 - << 'PYEOF'
          import os
          base = "app/src/main/java/com/bd2monitor"
          os.makedirs(base, exist_ok=True)
          files = {
          "DailyRecord.kt": "package com.bd2monitor\nimport androidx.room.Entity\nimport androidx.room.PrimaryKey\n@Entity(tableName = \"daily_records\")\ndata class DailyRecord(\n    @PrimaryKey(autoGenerate = true) val id: Int = 0,\n    val date: String,\n    val mood: Int,\n    val energy: Int,\n    val sleepHours: Float,\n    val medicationTaken: Boolean,\n    val steps: Int = 0,\n    val note: String = \"\",\n    val timestamp: Long = System.currentTimeMillis()\n)",
          "Medication.kt": "package com.bd2monitor\nimport androidx.room.Entity\nimport androidx.room.PrimaryKey\n@Entity(tableName = \"medications\")\ndata class Medication(\n    @PrimaryKey(autoGenerate = true) val id: Int = 0,\n    val nameFr: String,\n    val nameAr: String,\n    val dosage: String,\n    val timeHour: Int,\n    val timeMinute: Int,\n    val isActive: Boolean = true\n)",
          "PatientProfile.kt": "package com.bd2monitor\nimport androidx.room.Entity\nimport androidx.room.PrimaryKey\n@Entity(tableName = \"patient_profile\")\ndata class PatientProfile(\n    @PrimaryKey val id: Int = 1,\n    val fullNameAr: String = \"\",\n    val fullNameFr: String = \"\",\n    val birthDate: String = \"\",\n    val diagnosis: String = \"\",\n    val doctorName: String = \"\",\n    val emergencyContact: String = \"\",\n    val notes: String = \"\"\n)"
          }
          for name, content in files.items():
              with open(f"{base}/{name}", "w") as f:
                  f.write(content)
              print(f"Written: {name}")
          PYEOF

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEY_ALIAS: mediassistant
          SIGNING_KEY_PASSWORD: mediassistant123
          SIGNING_STORE_PASSWORD: mediassistant123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MediAssistant-Release
          path: android/app/build/outputs/apk/release/*.apk
