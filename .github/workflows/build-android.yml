name: Build Android APK

on:
  push:
    paths:
      - 'android/**'          # يتم التشغيل عند تعديل أي ملف داخل مجلد android
  workflow_dispatch:          # يسمح بالتشغيل اليدوي من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest    # نستخدم بيئة Linux

    steps:
      - name: Checkout code   # جلب الكود من المستودع
        uses: actions/checkout@v4

      - name: Set up JDK 17   # إعداد Java 17 (مطلوب لأندرويد)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle    # تخزين مؤقت للاعتماديات لتسريع البناء
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable   # جعل ملف gradlew قابل للتنفيذ في Linux
        run: chmod +x android/gradlew

      - name: Build Debug APK          # بناء APK بنمط التصحيح
        working-directory: android      # ننتقل إلى مجلد android
        run: ./gradlew assembleDebug   # استخدام الـ Wrapper

      - name: Upload APK               # رفع الملف الناتج
        uses: actions/upload-artifact@v4
        with:
          name: BD2-Monitor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
